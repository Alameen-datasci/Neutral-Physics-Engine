[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "neutral-physics-engine"
version = "3.0.0"
description = "Modular Python N-body gravity engine with Euler, RK4, and Velocity Verlet integrators, adaptive time-stepping, collision handling, and real-time energy tracking. NumPy-optimized with Matplotlib visuals—built for scientific and educational use."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
    { name = "Al Ameen" }
]

dependencies = [
    "numpy>=1.26",
    "matplotlib>=3.8"
]

[tool.setuptools.packages.find]
where = ["src"]