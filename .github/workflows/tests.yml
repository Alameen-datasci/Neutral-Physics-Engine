name: Neutral Physics Engine CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # Download repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Upgrade pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install pybind11 pytest numpy h5py matplotlib
          pip install -e .

      # Run tests
      - name: Run pytest
        run: pytest tests/

      # Verify import works
      - name: Verify package import
        run: |
          python -c "import neutral_physics_engine; print('Import successful')"